<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대중소 스도쿠</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>대중소 스도쿠</h1>
        
        <div class="controls">
            <div class="info">
                <span id="difficulty-display">난이도: 보통</span>
                <span id="timer">시간: 00:00</span>
            </div>
            <div class="actions">
                <button id="theme-toggle-btn" style="background: none; font-size: 1.2rem; padding: 4px 8px;">🌙</button>

                <select id="difficulty-select">
                    <option value="easy">쉬움</option>
                    <option value="medium" selected>보통</option>
                    <option value="hard">어려움</option>
                </select>                
                <button id="new-game-btn">새 게임</button>
            </div>
        </div>

        <div class="ux-tip" style="text-align: center; margin: 0.5rem 0 1rem 0; font-size: 0.85rem; color: #666; line-height: 1.4;">
            💡 <b>팁:</b> 클릭은 메모 입력, 길게 누르면 진짜 숫자 입력!!
        </div>

        <div id="sudoku-board" class="sudoku-grid">
            <!-- 9x9 cells will be generated by JavaScript -->
        </div>

        <div class="number-pad">
            <button class="numpad-btn" data-number="1">1</button>
            <button class="numpad-btn" data-number="2">2</button>
            <button class="numpad-btn" data-number="3">3</button>
            <button class="numpad-btn" data-number="4">4</button>
            <button class="numpad-btn" data-number="5">5</button>
            <button class="numpad-btn" data-number="6">6</button>
            <button class="numpad-btn" data-number="7">7</button>
            <button class="numpad-btn" data-number="8">8</button>
            <button class="numpad-btn" data-number="9">9</button>
            <button class="numpad-btn" data-number="erase">지우기</button>
            <button id="undo-btn" class="numpad-btn">되돌리기</button>
        </div>

        <div id="message" class="message"></div>
    </div>



    <!-- 커스텀 축하 모달 -->
    <div id="win-modal" class="modal-overlay">
        <div class="modal-content win-modal-content">
            <img id="fanfare-img" src="fanfare.png" alt="빵빠레" class="fanfare-img">
            <h2>🎉 축하합니다! 🎉</h2>
            <p class="win-message">정답입니다!</p>
            <p id="win-time-display">소요 시간: 00:00</p>
            <div class="modal-buttons">
                <button id="win-new-game-btn">새 게임 시작</button>
                <button id="win-close-btn" class="cancel-btn">닫기</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
